rules:
  ##########################################################################
  # TEST RULE - Detect importScripts usage
  ##########################################################################
  - id: test.import_scripts
    message: "[TEST] importScripts() detected - used to load additional JS files"
    severity: INFO
    languages: [javascript, typescript]
    metadata:
      category: test
      description: Detects importScripts() calls to verify custom rules work
    pattern: importScripts(...)

  ##########################################################################
  # 1) Fake UI overlay / fake login button
  ##########################################################################
  - id: banking.fake_overlay.zindex
    message: Suspicious overlay/button with high z-index—possible fake UI capture.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      category: ui-overlay
      mitre: [TA0009, T1056]
      owasp: [A02-Cryptographic Failures, A07-Identification and Authentication]
    patterns:
      - pattern-either:
          - pattern: |
              $E.innerHTML = $S;
          - pattern: |
              $P.insertAdjacentHTML($POS, $S);
      - metavariable-regex:
          metavariable: $S
          regex: "<div[^>]*(z-index|position\\s*:\\s*(fixed|absolute))"

  ##########################################################################
  # 2) Form hijack / submit interception + exfiltration
  ##########################################################################
  - id: banking.form_hijack.submit_intercept
    message: Form submit intercepted with exfiltration/redirect—possible credential grab.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      category: form-hijack
      mitre: [T1185, T1056, T1041]
    patterns:
      - pattern: |
          $F.addEventListener('submit', function($EV, ...){ ... });
      - pattern-inside: |
          function($EV, ...){ ... $EV.preventDefault(...); ... }
      - pattern-either:
          - pattern: |
              fetch($URL, ...);
          - pattern: |
              (new XMLHttpRequest()).open($M, $URL, ...);
          - pattern: |
              navigator.sendBeacon($URL, ...);

  ##########################################################################
  # 3) Credential sniffing — hooks on password fields
  ##########################################################################
  - id: banking.cred_sniff.password_input_hooks
    message: Event hooks on password inputs—may capture credentials.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      category: credential-access
      mitre: [T1056, T1555]
    pattern-either:
      - pattern: |
          document.querySelectorAll('input[type="password"]').forEach(($N) => { ... });
      - pattern: |
          document.querySelector('input[type="password"]').addEventListener($EV, ...);

  ##########################################################################
  # 4) Extension network hijack (chrome.webRequest)
  ##########################################################################

  - id: banking.ext.webrequest.redirect
    message: chrome.webRequest redirect/modify—can hijack requests (transactions, MFA).
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      category: extension-hijack
      mitre: [T1110, T1565]
    patterns:
      - pattern: |
          chrome.webRequest.onBeforeRequest.addListener(function($D){ ... return { redirectUrl: $U }; }, $F, $O);

  ##########################################################################
  # 5) Global network sniffing—override XHR/fetch
  ##########################################################################
  - id: banking.net_sniff.override_fetch_xhr
    message: Overriding fetch/XHR prototypes—global sniffing or tampering of requests.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      category: net-interception
      mitre: [T1041, T1557]
    pattern-either:
      - pattern: |
          const $OF = window.fetch;
          window.fetch = function(...){ ... };
      - pattern: |
          XMLHttpRequest.prototype.open = function(...){ ... };
      - pattern: |
          XMLHttpRequest.prototype.send = function(...){ ... };

  ##########################################################################
  # 6) Automatic transfer / auto-submit transactions
  ##########################################################################
  - id: banking.auto_transfer.silent_payment
    message: Potential silent payment/transfer action without explicit user consent.
    severity: CRITICAL
    languages: [javascript, typescript]
    metadata:
      category: transaction-abuse
      mitre: [T1566, T1499]
    patterns:
      - pattern: |
          fetch($URL, { ... });
      - metavariable-regex:
          metavariable: $URL
          regex: "(transfer|payment|pay|wire|cashout|payout)"
      - pattern-not: |
          fetch($URL, { method: 'GET', ... });

  ##########################################################################
  # 7) MutationObserver used for dynamic hooking of sensitive nodes
  ##########################################################################
  - id: banking.mobserver.dynamic_dom_hook
    message: MutationObserver used to append UI or trigger network send—malicious overlay/exfil?
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      category: stealth-hooking
      mitre: [T1056, T1027]
    pattern: |
      new MutationObserver(...);

  ##########################################################################
  # 8) Exfiltration channels (sendBeacon / Image.src / fetch GET with secrets)
  ##########################################################################

  - id: banking.exfil.generic_channels
    message: Possible exfiltration via sendBeacon/Image.src/fetch.
    severity: CRITICAL
    languages: [javascript, typescript]
    metadata:
      category: exfiltration
      mitre: [T1041]
    pattern-either:
      - pattern: |
          navigator.sendBeacon($URL, $DATA);
      - pattern: |
          (new Image()).src = $URL;
      - patterns:
          - pattern: |
              fetch($URL, ...);
          - metavariable-regex:
              metavariable: $URL
              regex: "https?://[^\\s]+\\?(.*(pass(word)?|user(name)?|token|otp|iban|account).*)"

  ##########################################################################
  # 9) Disabling/weakening CSP (DOM or extension headers)
  ##########################################################################
  - id: banking.csp.disable_or_weaken
    message: CSP disabled/relaxed—enables untrusted script injection.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      category: hardening-bypass
      mitre: [T1518, T1562]
    pattern-either:
      - pattern: |
          $M.setAttribute('http-equiv', 'Content-Security-Policy');
      - pattern: |
          chrome.webRequest.onHeadersReceived.addListener(function($D){ ... }, $F, ['blocking', 'responseHeaders']);

  ##########################################################################
  # 10) Dynamic eval / new Function (+ decoding)
  ##########################################################################
  - id: banking.obfuscation.eval_newfunc
    message: Dynamic code execution (eval/new Function) with possible decoding—common in malware.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      category: obfuscation
      mitre: [T1027, T1059]
    pattern-either:
      - pattern: |
          eval($X);
      - pattern: |
          new Function($X);

######################################################################
# Third-party external API calls detection (all HTTP methods)
######################################################################
  - id: banking.third_party.external_api_calls
    message: Third-party API call detected—extension communicating with external domains.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      category: third-party-api
      mitre: [T1041, T1071]
      owasp: [A01-Broken Access Control, A05-Security Misconfiguration]
    pattern-either:
      # Structural patterns for well-formatted code
      - patterns:
          - pattern: |
              fetch($URL, ...);
          - metavariable-regex:
              metavariable: $URL
              regex: "https?://(?!chrome://|chrome-extension://|localhost|127\\.0\\.0\\.1|0\\.0\\.0\\.0|\\*)[a-zA-Z0-9][a-zA-Z0-9.-]*[a-zA-Z0-9]*\\.[a-zA-Z]{2,}"
      - patterns:
          - pattern: |
              (new XMLHttpRequest()).open($M, $URL, ...);
          - metavariable-regex:
              metavariable: $URL
              regex: "https?://(?!chrome://|chrome-extension://|localhost|127\\.0\\.0\\.1|0\\.0\\.0\\.0|\\*)[a-zA-Z0-9][a-zA-Z0-9.-]*[a-zA-Z0-9]*\\.[a-zA-Z]{2,}"
      - patterns:
          - pattern: |
              new WebSocket($URL, ...);
          - metavariable-regex:
              metavariable: $URL
              regex: "(ws|wss)://(?!localhost|127\\.0\\.0\\.1|\\*)[a-zA-Z0-9][a-zA-Z0-9.-]*[a-zA-Z0-9]*\\.[a-zA-Z]{2,}"
      - patterns:
          - pattern: |
              $WINDOW.postMessage($DATA, $ORIGIN, ...);
          - metavariable-regex:
              metavariable: $ORIGIN
              regex: "https?://(?!chrome://|chrome-extension://|localhost|\\*)[a-zA-Z0-9][a-zA-Z0-9.-]*[a-zA-Z0-9]*\\.[a-zA-Z]{2,}"
      - patterns:
          - pattern: |
              navigator.sendBeacon($URL, ...);
          - metavariable-regex:
              metavariable: $URL
              regex: "https?://(?!chrome://|chrome-extension://|localhost|127\\.0\\.0\\.1|0\\.0\\.0\\.0|\\*)[a-zA-Z0-9][a-zA-Z0-9.-]*[a-zA-Z0-9]*\\.[a-zA-Z]{2,}"
      # Regex patterns for minified code - simplified (Semgrep pattern-regex has limited regex support)
      # Matches external URLs and filters chrome:///localhost in post-processing
      - pattern-regex: |
          fetch\s*\(\s*["']https?://[a-zA-Z0-9][a-zA-Z0-9.-]*\.[a-zA-Z]{2,}[^\s"\'`)]*["']
      - pattern-regex: |
          fetch\s*\(\s*`https?://[a-zA-Z0-9][a-zA-Z0-9.-]*\.[a-zA-Z]{2,}[^\s"\'`)]*`
      - pattern-regex: |
          \.open\s*\(\s*["'][^"']*["']\s*,\s*["']https?://[a-zA-Z0-9][a-zA-Z0-9.-]*\.[a-zA-Z]{2,}[^\s"\'`)]*["']
      - pattern-regex: |
          new\s+WebSocket\s*\(\s*["'](?:ws|wss)://[a-zA-Z0-9][a-zA-Z0-9.-]*\.[a-zA-Z]{2,}[^\s"\'`)]*["']
      - pattern-regex: |
          postMessage\s*\([^,]+,\s*["']https?://[a-zA-Z0-9][a-zA-Z0-9.-]*\.[a-zA-Z]{2,}[^\s"\'`)]*["']
      - pattern-regex: |
          navigator\.sendBeacon\s*\(\s*["']https?://[a-zA-Z0-9][a-zA-Z0-9.-]*\.[a-zA-Z]{2,}[^\s"\'`)]*["']

  ##########################################################################
  # MALWARE-DETECTION RULES — adapted from ThreatXtension's Semgrep ruleset.
  # Substantially the upstream rule set, plus ExtensionShield additions.
  # MIT per upstream README; no separate upstream LICENSE file is published.
  # Source: https://github.com/barvhaim/ThreatXtension
  # Covers: credential theft, cookie theft, C2/exfiltration, keylogger,
  # clipboard, URL hijacking, and tracking.
  # Attribution: see docs/NOTICE.
  ##########################################################################
  - id: credential.theft.storage_access
    message: Accessing localStorage/sessionStorage for credentials—potential credential theft.
    severity: CRITICAL
    languages: [javascript, typescript]
    metadata:
      category: credential-theft
      mitre: [T1555.003, T1539]
      cwe: [CWE-522, CWE-312]
      owasp: [A02-Cryptographic Failures, A07-Identification and Authentication]
      description: Detects access to browser storage APIs that may contain credentials
    pattern-either:
      - patterns:
          - pattern: localStorage.getItem($KEY)
          - metavariable-regex:
              metavariable: $KEY
              regex: "(token|password|pass|pwd|credential|auth|session|jwt|bearer|api[_-]?key|secret)"
      - patterns:
          - pattern: sessionStorage.getItem($KEY)
          - metavariable-regex:
              metavariable: $KEY
              regex: "(token|password|pass|pwd|credential|auth|session|jwt|bearer|api[_-]?key|secret)"
      - pattern: |
          for (let $I = 0; $I < localStorage.length; $I++) {
            localStorage.getItem(...);
          }
      - pattern: |
          Object.keys(localStorage).forEach(...)

  ##########################################################################
  # 12) Credential Theft - Password Field Value Extraction
  ##########################################################################
  - id: credential.theft.password_extraction
    message: Direct extraction of password field values—credential harvesting detected.
    severity: CRITICAL
    languages: [javascript, typescript]
    metadata:
      category: credential-theft
      mitre: [T1056.001, T1555]
      cwe: [CWE-522, CWE-359]
      owasp: [A07-Identification and Authentication]
      description: Detects direct access to password input field values
    pattern-either:
      - pattern: |
          document.querySelector('input[type="password"]').value
      - pattern: |
          document.querySelectorAll('input[type="password"]')
      - pattern: |
          $ELEM.querySelector('input[type="password"]').value
      - pattern: |
          document.getElementById($ID).value
      - patterns:
          - pattern: $FORM.elements[$NAME].value
          - metavariable-regex:
              metavariable: $NAME
              regex: "(password|passwd|pwd|pass)"

  ##########################################################################
  # 13) Credential Theft - Form Data Serialization
  ##########################################################################
  - id: credential.theft.form_serialization
    message: Form data serialization with network transmission—credential exfiltration risk.
    severity: CRITICAL
    languages: [javascript, typescript]
    metadata:
      category: credential-theft
      mitre: [T1056.001, T1041]
      cwe: [CWE-522, CWE-319]
      description: Detects form data collection and transmission patterns
    pattern-either:
      - pattern: new FormData($FORM)
      - pattern: |
          $FORM.querySelectorAll('input')

  ##########################################################################
  # 14) Cookie Stealing - document.cookie Access
  ##########################################################################
  - id: cookie.theft.document_cookie_access
    message: Accessing document.cookie—potential cookie theft for session hijacking.
    severity: CRITICAL
    languages: [javascript, typescript]
    metadata:
      category: cookie-theft
      mitre: [T1539, T1550.004]
      cwe: [CWE-539, CWE-614]
      owasp: [A07-Identification and Authentication, A01-Broken Access Control]
      description: Detects access to document.cookie which may contain session tokens
    pattern-either:
      - pattern: document.cookie
      - pattern: |
          const $C = document.cookie;
      - pattern: |
          let $C = document.cookie;
      - pattern: |
          var $C = document.cookie;

  ##########################################################################
  # 15) Cookie Stealing - Cookie Exfiltration
  ##########################################################################
  - id: cookie.theft.cookie_exfiltration
    message: Cookie data being sent to external server—active cookie theft detected.
    severity: CRITICAL
    languages: [javascript, typescript]
    metadata:
      category: cookie-theft
      mitre: [T1539, T1041]
      cwe: [CWE-539, CWE-319]
      owasp: [A07-Identification and Authentication]
      description: Detects patterns where cookies are extracted and transmitted
    pattern: document.cookie

  ##########################################################################
  # 16) Cookie Stealing - chrome.cookies API Abuse
  ##########################################################################
  - id: cookie.theft.chrome_cookies_api
    message: Using chrome.cookies API to access cookies—potential session hijacking.
    severity: CRITICAL
    languages: [javascript, typescript]
    metadata:
      category: cookie-theft
      mitre: [T1539, T1550.004]
      cwe: [CWE-539]
      description: Detects Chrome extension API usage for cookie access
    pattern-either:
      - pattern: chrome.cookies.get(...)
      - pattern: chrome.cookies.getAll(...)
      - pattern: chrome.cookies.getAllCookieStores(...)

  ##########################################################################
  # 17) C2 Communication - WebSocket Connections
  ##########################################################################
  - id: c2.exfiltration.websocket_connection
    message: WebSocket connection to external server—potential C2 communication channel.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      category: c2-communication
      mitre: [T1071.001, T1573]
      cwe: [CWE-940]
      description: Detects WebSocket connections that may be used for C2 communication
    pattern: new WebSocket($URL)

  ##########################################################################
  # 18) C2 Communication - Periodic Beaconing
  ##########################################################################
  - id: c2.exfiltration.periodic_beacon
    message: Periodic network requests detected—potential C2 beaconing behavior.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      category: c2-communication
      mitre: [T1071, T1041, T1102]
      cwe: [CWE-940]
      description: Detects periodic network communication patterns typical of C2
    pattern-either:
      - pattern: |
          setInterval(function() { ... }, $INTERVAL)
      - pattern: |
          setInterval(() => { ... }, $INTERVAL)

  ##########################################################################
  # 19) C2 Communication - Base64 Encoded Exfiltration
  ##########################################################################
  - id: c2.exfiltration.base64_encoded_data
    message: Base64 encoding with network transmission—obfuscated data exfiltration.
    severity: CRITICAL
    languages: [javascript, typescript]
    metadata:
      category: c2-communication
      mitre: [T1041, T1132.001]
      cwe: [CWE-319, CWE-311]
      description: Detects base64 encoding of data before network transmission
    pattern-either:
      - pattern: btoa($DATA)
      - pattern: Buffer.from($DATA).toString('base64')
      - pattern: atob($DATA)

  ##########################################################################
  # 20) C2 Communication - DNS Tunneling
  ##########################################################################
  - id: c2.exfiltration.dns_tunneling
    message: Suspicious DNS-like requests with encoded data—potential DNS tunneling.
    severity: CRITICAL
    languages: [javascript, typescript]
    metadata:
      category: c2-communication
      mitre: [T1071.004, T1048.003]
      cwe: [CWE-940]
      description: Detects patterns consistent with DNS tunneling for data exfiltration
    patterns:
      - pattern: fetch($URL, ...)
      - metavariable-regex:
          metavariable: $URL
          regex: "https?://[a-zA-Z0-9\\-]+\\.[a-zA-Z0-9\\-]+\\.[a-zA-Z]{2,}/(\\?|#)?[a-zA-Z0-9+/=]{20,}"

  ##########################################################################
  # 21) C2 Communication - Steganography (Image-based)
  ##########################################################################
  - id: c2.exfiltration.image_steganography
    message: Canvas/Image manipulation with network send—potential steganographic exfiltration.
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      category: c2-communication
      mitre: [T1027.003, T1041]
      cwe: [CWE-311]
      description: Detects canvas manipulation that may hide data in images
    pattern-either:
      - pattern: |
          $CTX.getImageData(...)
      - pattern: |
          $CANVAS.toDataURL(...)
      - pattern: |
          $CANVAS.toBlob(...)

  ##########################################################################
  # 22) Credential Theft - Clipboard Hijacking
  ##########################################################################
  - id: credential.theft.clipboard_hijack
    message: Clipboard access detected—may capture copied passwords or sensitive data.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      category: credential-theft
      mitre: [T1115]
      cwe: [CWE-200]
      description: Detects clipboard API usage that may capture sensitive data
    pattern-either:
      - pattern: navigator.clipboard.readText()
      - pattern: navigator.clipboard.read()
      - pattern: document.execCommand('paste')

  ##########################################################################
  # 23) Credential Theft - Keylogger Pattern
  ##########################################################################
  - id: credential.theft.keylogger
    message: Keylogging pattern detected—capturing all keyboard input including passwords.
    severity: CRITICAL
    languages: [javascript, typescript]
    metadata:
      category: credential-theft
      mitre: [T1056.001]
      cwe: [CWE-200, CWE-359]
      owasp: [A07-Identification and Authentication]
      description: Detects keylogger patterns that capture keyboard events
    pattern-either:
      - pattern: |
          document.addEventListener('keydown', ...)
      - pattern: |
          document.addEventListener('keypress', ...)
      - pattern: |
          document.addEventListener('keyup', ...)

  ##########################################################################
  # 24) C2 Communication - Chrome Runtime Messaging to External
  ##########################################################################
  - id: c2.exfiltration.chrome_runtime_external
    message: Chrome runtime messaging to external extensions—potential C2 channel.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      category: c2-communication
      mitre: [T1071, T1102]
      cwe: [CWE-940]
      description: Detects external messaging that may be used for C2 communication
    pattern-either:
      - pattern: chrome.runtime.sendMessage($EXT_ID, $MSG, ...)
      - pattern: chrome.runtime.connect($EXT_ID, ...)
      - patterns:
          - pattern: chrome.runtime.sendMessage($EXT_ID, $MSG, ...)
          - metavariable-regex:
              metavariable: $EXT_ID
              regex: "[a-z]{32}"

  ##########################################################################
  # 25) Cookie Theft - IndexedDB Cookie Storage
  ##########################################################################
  - id: cookie.theft.indexeddb_storage
    message: Storing cookies in IndexedDB—potential persistent cookie theft mechanism.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      category: cookie-theft
      mitre: [T1539, T1005]
      cwe: [CWE-539, CWE-312]
      description: Detects storing of cookie data in IndexedDB for persistence
    pattern-either:
      - pattern: |
          $DB.transaction(...).objectStore(...).add(...)
      - pattern: |
          $DB.transaction(...).objectStore(...).put(...)
      - pattern: |
          indexedDB.open(...)

  ##########################################################################
  # 26) C2 Communication - Fetch with Credentials Include
  ##########################################################################
  - id: c2.exfiltration.fetch_credentials_include
    message: Fetch with credentials:include to external domain—session hijacking risk.
    severity: CRITICAL
    languages: [javascript, typescript]
    metadata:
      category: c2-communication
      mitre: [T1539, T1041]
      cwe: [CWE-352, CWE-319]
      description: Detects fetch requests that include credentials to external domains
    pattern: fetch($URL, ...)

  ##########################################################################
  # 27) Credential Theft - Chrome Identity API Abuse
  ##########################################################################
  - id: credential.theft.chrome_identity_api
    message: Chrome identity API usage—accessing OAuth tokens or user identity.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      category: credential-theft
      mitre: [T1528, T1550.001]
      cwe: [CWE-522]
      description: Detects Chrome identity API usage for token theft
    pattern-either:
      - pattern: chrome.identity.getAuthToken(...)
      - pattern: chrome.identity.getProfileUserInfo(...)
      - pattern: chrome.identity.launchWebAuthFlow(...)

  ##########################################################################
  # 28) C2 Communication - Dynamic Script Loading from External Source
  ##########################################################################
  - id: c2.exfiltration.dynamic_script_loading
    message: Dynamic script loading from external source—potential remote code execution.
    severity: CRITICAL
    languages: [javascript, typescript]
    metadata:
      category: c2-communication
      mitre: [T1059.007, T1105]
      cwe: [CWE-494, CWE-829]
      description: Detects dynamic loading of scripts from external sources
    pattern-either:
      - pattern: document.createElement('script')
      - pattern: |
          document.write('<script src="' + $URL + '"></script>')
      - pattern: |
          $ELEM.innerHTML = '<script src="' + $URL + '"></script>'
      - pattern: eval($CODE)
      - pattern: new Function($CODE)

  ##########################################################################
  # 29) C2 Communication - Hardcoded C2 Server List
  ##########################################################################
  - id: c2.infrastructure.server_list
    message: Hardcoded list of suspicious C2 domains detected—malware infrastructure.
    severity: CRITICAL
    languages: [javascript, typescript]
    metadata:
      category: c2-communication
      mitre: [T1071, T1583.001]
      cwe: [CWE-506, CWE-940]
      description: Detects arrays of suspicious domains used for C2 communication
    patterns:
      - pattern-either:
          - pattern: |
              const $VAR = [ ..., $URL1, ..., $URL2, ... ];
          - pattern: |
              let $VAR = [ ..., $URL1, ..., $URL2, ... ];
          - pattern: |
              var $VAR = [ ..., $URL1, ..., $URL2, ... ];
      - metavariable-regex:
          metavariable: $URL1
          regex: "https?://[a-z0-9]{20,}\\.[a-z]{2,20}\\.[a-z]{2,10}/"
      - metavariable-regex:
          metavariable: $URL2
          regex: "https?://[a-z0-9]{20,}\\.[a-z]{2,20}\\.[a-z]{2,10}/"

  ##########################################################################
  # 30) URL Hijacking - webNavigation Redirect
  ##########################################################################
  - id: hijacking.url_redirect.webnavigation
    message: webNavigation listener redirecting user navigation—URL hijacking detected.
    severity: CRITICAL
    languages: [javascript, typescript]
    metadata:
      category: url-hijacking
      mitre: [T1185, T1565.002]
      cwe: [CWE-601, CWE-346]
      description: Detects webNavigation API abuse to redirect user browsing
    patterns:
      - pattern: |
          chrome.webNavigation.onBeforeNavigate.addListener(...)
      - pattern-inside: |
          chrome.tabs.update($TAB, { url: $URL })

  ##########################################################################
  # 31) Tracking - Persistent User ID Generation
  ##########################################################################
  - id: tracking.persistent_user_id
    message: Generating persistent tracking ID with crypto—user fingerprinting detected.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      category: tracking
      mitre: [T1082, T1592.004]
      cwe: [CWE-359, CWE-200]
      description: Detects generation of persistent user identifiers for tracking
    patterns:
      - pattern: crypto.getRandomValues($ARRAY)
      - pattern-inside: |
