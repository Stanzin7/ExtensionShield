rules:
  ##########################################################################
  # TEST RULE - Detect importScripts usage
  ##########################################################################
  - id: test.import_scripts
    message: "[TEST] importScripts() detected - used to load additional JS files"
    severity: INFO
    languages: [javascript, typescript]
    metadata:
      category: test
      description: Detects importScripts() calls to verify custom rules work
    pattern: importScripts(...)

  ##########################################################################
  # 1) Fake UI overlay / fake login button
  ##########################################################################
  - id: banking.fake_overlay.zindex
    message: Suspicious overlay/button with high z-index—possible fake UI capture.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      category: ui-overlay
      mitre: [TA0009, T1056]
      owasp: [A02-Cryptographic Failures, A07-Identification and Authentication]
    patterns:
      - pattern-either:
          - pattern: |
              $E.innerHTML = $S;
          - pattern: |
              $P.insertAdjacentHTML($POS, $S);
      - metavariable-regex:
          metavariable: $S
          regex: "<div[^>]*(z-index|position\\s*:\\s*(fixed|absolute))"

  ##########################################################################
  # 2) Form hijack / submit interception + exfiltration
  ##########################################################################
  - id: banking.form_hijack.submit_intercept
    message: Form submit intercepted with exfiltration/redirect—possible credential grab.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      category: form-hijack
      mitre: [T1185, T1056, T1041]
    patterns:
      - pattern: |
          $F.addEventListener('submit', function($EV, ...){ ... });
      - pattern-inside: |
          function($EV, ...){ ... $EV.preventDefault(...); ... }
      - pattern-either:
          - pattern: |
              fetch($URL, ...);
          - pattern: |
              (new XMLHttpRequest()).open($M, $URL, ...);
          - pattern: |
              navigator.sendBeacon($URL, ...);

  ##########################################################################
  # 3) Credential sniffing — hooks on password fields
  ##########################################################################
  - id: banking.cred_sniff.password_input_hooks
    message: Event hooks on password inputs—may capture credentials.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      category: credential-access
      mitre: [T1056, T1555]
    pattern-either:
      - pattern: |
          document.querySelectorAll('input[type="password"]').forEach(($N) => {
            $N.addEventListener($EV, (...)=>
              { ... (fetch|XMLHttpRequest|navigator.sendBeacon) ... }
            );
          });
      - pattern: |
          const $N = document.querySelector('input[type="password"]');
          $N.addEventListener($EV, (...)=>
            { ... (fetch|XMLHttpRequest|navigator.sendBeacon) ... }
          );

  ##########################################################################
  # 4) Extension network hijack (chrome.webRequest)
  ##########################################################################
  - id: banking.ext.webrequest.redirect
    message: chrome.webRequest redirect/modify—can hijack requests (transactions, MFA).
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      category: extension-hijack
      mitre: [T1110, T1565]
    patterns:
      - pattern: |
          chrome.webRequest.onBeforeRequest.addListener(function($D){ ... return { redirectUrl: $U }; }, $F, $O);

  ##########################################################################
  # 5) Global network sniffing—override XHR/fetch
  ##########################################################################
  - id: banking.net_sniff.override_fetch_xhr
    message: Overriding fetch/XHR prototypes—global sniffing or tampering of requests.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      category: net-interception
      mitre: [T1041, T1557]
    pattern-either:
      - pattern: |
          const $OF = window.fetch;
          window.fetch = function(...){ ... };
      - pattern: |
          XMLHttpRequest.prototype.open = function(...){ ... };
      - pattern: |
          XMLHttpRequest.prototype.send = function(...){ ... };

  ##########################################################################
  # 6) Automatic transfer / auto-submit transactions
  ##########################################################################
  - id: banking.auto_transfer.silent_payment
    message: Potential silent payment/transfer action without explicit user consent.
    severity: CRITICAL
    languages: [javascript, typescript]
    metadata:
      category: transaction-abuse
      mitre: [T1566, T1499]
    patterns:
      - pattern: |
          fetch($URL, { ... });
      - metavariable-regex:
          metavariable: $URL
          regex: "(transfer|payment|pay|wire|cashout|payout)"
      - pattern-not: |
          fetch($URL, { method: 'GET', ... });

  ##########################################################################
  # 7) MutationObserver used for dynamic hooking of sensitive nodes
  ##########################################################################
  - id: banking.mobserver.dynamic_dom_hook
    message: MutationObserver used to append UI or trigger network send—malicious overlay/exfil?
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      category: stealth-hooking
      mitre: [T1056, T1027]
    patterns:
      - pattern: |
          new MutationObserver(($M) => { ... });
      - pattern-inside: |
          ($X) => { ... (appendChild|insertAdjacentHTML|fetch|navigator.sendBeacon) ... }

  ##########################################################################
  # 8) Exfiltration channels (sendBeacon / Image.src / fetch GET with secrets)
  ##########################################################################
  - id: banking.exfil.generic_channels
    message: Possible exfiltration via sendBeacon/Image.src/fetch.
    severity: CRITICAL
    languages: [javascript, typescript]
    metadata:
      category: exfiltration
      mitre: [T1041]
    pattern-either:
      - pattern: |
          navigator.sendBeacon($URL, $DATA);
      - pattern: |
          (new Image()).src = $URL;
      - patterns:
          - pattern: |
              fetch($URL, ...);
          - metavariable-regex:
              metavariable: $URL
              regex: "https?://[^\\s]+\\?(.*(pass(word)?|user(name)?|token|otp|iban|account).*)"

  ##########################################################################
  # 9) Disabling/weakening CSP (DOM or extension headers)
  ##########################################################################
  - id: banking.csp.disable_or_weaken
    message: CSP disabled/relaxed—enables untrusted script injection.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      category: hardening-bypass
      mitre: [T1518, T1562]
    pattern-either:
      - pattern: |
          $M.setAttribute('http-equiv', 'Content-Security-Policy');
      - pattern: |
          chrome.webRequest.onHeadersReceived.addListener(function($D){ ... }, $F, ['blocking', 'responseHeaders']);

  ##########################################################################
  # 10) Dynamic eval / new Function (+ decoding)
  ##########################################################################
  - id: banking.obfuscation.eval_newfunc
    message: Dynamic code execution (eval/new Function) with possible decoding—common in malware.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      category: obfuscation
      mitre: [T1027, T1059]
    pattern-either:
      - pattern: |
          eval($X);
      - pattern: |
          new Function($X);

######################################################################
# Third-party external API calls detection (all HTTP methods)
######################################################################
  - id: banking.third_party.external_api_calls
    message: Third-party API call detected—extension communicating with external domains.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      category: third-party-api
      mitre: [T1041, T1071]
      owasp: [A01-Broken Access Control, A05-Security Misconfiguration]
    pattern-either:
      # Structural patterns for well-formatted code
      - patterns:
          - pattern: |
              fetch($URL, ...);
          - metavariable-regex:
              metavariable: $URL
              regex: "https?://(?!chrome://|chrome-extension://|localhost|127\\.0\\.0\\.1|0\\.0\\.0\\.0|\\*)[a-zA-Z0-9][a-zA-Z0-9.-]*[a-zA-Z0-9]*\\.[a-zA-Z]{2,}"
      - patterns:
          - pattern: |
              (new XMLHttpRequest()).open($M, $URL, ...);
          - metavariable-regex:
              metavariable: $URL
              regex: "https?://(?!chrome://|chrome-extension://|localhost|127\\.0\\.0\\.1|0\\.0\\.0\\.0|\\*)[a-zA-Z0-9][a-zA-Z0-9.-]*[a-zA-Z0-9]*\\.[a-zA-Z]{2,}"
      - patterns:
          - pattern: |
              new WebSocket($URL, ...);
          - metavariable-regex:
              metavariable: $URL
              regex: "(ws|wss)://(?!localhost|127\\.0\\.0\\.1|\\*)[a-zA-Z0-9][a-zA-Z0-9.-]*[a-zA-Z0-9]*\\.[a-zA-Z]{2,}"
      - patterns:
          - pattern: |
              $WINDOW.postMessage($DATA, $ORIGIN, ...);
          - metavariable-regex:
              metavariable: $ORIGIN
              regex: "https?://(?!chrome://|chrome-extension://|localhost|\\*)[a-zA-Z0-9][a-zA-Z0-9.-]*[a-zA-Z0-9]*\\.[a-zA-Z]{2,}"
      - patterns:
          - pattern: |
              navigator.sendBeacon($URL, ...);
          - metavariable-regex:
              metavariable: $URL
              regex: "https?://(?!chrome://|chrome-extension://|localhost|127\\.0\\.0\\.1|0\\.0\\.0\\.0|\\*)[a-zA-Z0-9][a-zA-Z0-9.-]*[a-zA-Z0-9]*\\.[a-zA-Z]{2,}"
      # Regex patterns for minified code - simplified (Semgrep pattern-regex has limited regex support)
      # Matches external URLs and filters chrome:///localhost in post-processing
      - pattern-regex: |
          fetch\s*\(\s*["']https?://[a-zA-Z0-9][a-zA-Z0-9.-]*\.[a-zA-Z]{2,}[^\s"\'`)]*["']
      - pattern-regex: |
          fetch\s*\(\s*`https?://[a-zA-Z0-9][a-zA-Z0-9.-]*\.[a-zA-Z]{2,}[^\s"\'`)]*`
      - pattern-regex: |
          \.open\s*\(\s*["'][^"']*["']\s*,\s*["']https?://[a-zA-Z0-9][a-zA-Z0-9.-]*\.[a-zA-Z]{2,}[^\s"\'`)]*["']
      - pattern-regex: |
          new\s+WebSocket\s*\(\s*["'](?:ws|wss)://[a-zA-Z0-9][a-zA-Z0-9.-]*\.[a-zA-Z]{2,}[^\s"\'`)]*["']
      - pattern-regex: |
          postMessage\s*\([^,]+,\s*["']https?://[a-zA-Z0-9][a-zA-Z0-9.-]*\.[a-zA-Z]{2,}[^\s"\'`)]*["']
      - pattern-regex: |
          navigator\.sendBeacon\s*\(\s*["']https?://[a-zA-Z0-9][a-zA-Z0-9.-]*\.[a-zA-Z]{2,}[^\s"\'`)]*["']
# =========================
# CRITICAL: Code Execution
# =========================

  - id: no-eval
    pattern: eval(...)
    message: "Avoid eval() - possible code injection"
    severity: ERROR
    languages: [javascript]

  - id: new-function
    pattern: new Function(...)
    message: "Dynamic code execution via Function constructor"
    severity: ERROR
    languages: [javascript]

  - id: settimeout-string
    pattern: setTimeout("...", ...)
    message: "setTimeout with string is dangerous"
    severity: WARNING
    languages: [javascript]

  - id: setinterval-string
    pattern: setInterval("...", ...)
    message: "setInterval with string is dangerous"
    severity: WARNING
    languages: [javascript]
# =========================
#  Network / Remote Code
# =========================

  - id: dynamic-import-remote
    pattern: import($URL)
    message: "Dynamic import detected - possible remote code execution"
    severity: ERROR
    languages: [javascript]

  - id: remote-fetch
    pattern: fetch($URL)
    message: "External network call detected"
    severity: WARNING
    languages: [javascript]

  - id: xhr-usage
    pattern: new XMLHttpRequest()
    message: "XHR usage detected - possible data exfiltration"
    severity: WARNING
    languages: [javascript]

  - id: post-data-exfiltration
    pattern: fetch($URL, {method: "POST", ...})
    message: "POST request - possible data exfiltration"
    severity: WARNING
    languages: [javascript]

  - id: hardcoded-external-url
    pattern: '"http://$DOMAIN/..."'
    message: "Hardcoded external HTTP URL"
    severity: WARNING
    languages: [javascript]
# =========================
# 🧬 Obfuscation / Encoding
# =========================

  - id: base64-decode
    pattern: atob(...)
    message: "Base64 decoding detected - possible obfuscation"
    severity: WARNING
    languages: [javascript]

  - id: encoded-eval
    pattern: eval(atob(...))
    message: "Obfuscated eval detected"
    severity: ERROR
    languages: [javascript]
# =========================
# 💉 Script Injection
# =========================

  - id: execute-script
    pattern-either:
      - pattern: chrome.tabs.executeScript(...)
      - pattern: chrome.scripting.executeScript(...)
    message: "Script injection capability detected"
    severity: ERROR
    languages: [javascript]

  - id: script-injection
    pattern: document.createElement("script")
    message: "Dynamic script injection detected"
    severity: ERROR
    languages: [javascript]

  - id: append-script
    pattern: |
      $X = document.createElement("script");
      $X.src = $URL;
    message: "Injecting external script into DOM"
    severity: ERROR
    languages: [javascript]

  - id: innerhtml-script
    pattern: element.innerHTML = $X
    message: "innerHTML used - possible injection"
    severity: WARNING
    languages: [javascript]

  - id: document-write
    pattern: document.write(...)
    message: "document.write is dangerous"
    severity: ERROR
    languages: [javascript]

  # =========================
  # Data Access / Privacy
  # =========================

  - id: chrome-cookies-access
    pattern: chrome.cookies.getAll(...)
    message: "Accessing cookies - sensitive data"
    severity: ERROR
    languages: [javascript]

  - id: chrome-history-access
    pattern: chrome.history.search(...)
    message: "Accessing browsing history"
    severity: ERROR
    languages: [javascript]

  - id: chrome-tabs-query
    pattern: chrome.tabs.query(...)
    message: "Accessing user tabs"
    severity: WARNING
    languages: [javascript]

  - id: chrome-storage
    pattern: chrome.storage.local.get(...)
    message: "Accessing stored data"
    severity: WARNING
    languages: [javascript]

  # =========================
  # Dangerous Chrome APIs
  # =========================

  - id: webrequest-interception
    pattern: chrome.webRequest.onBeforeRequest.addListener(...)
    message: "Intercepting network requests"
    severity: ERROR
    languages: [javascript]

  # =========================
  # Tracking / Fingerprinting
  # =========================

  - id: localstorage-tracking
    pattern: localStorage.setItem(...)
    message: "Possible tracking via localStorage"
    severity: INFO
    languages: [javascript]

  - id: navigator-fingerprint
    pattern: navigator.userAgent
    message: "User fingerprinting detected"
    severity: INFO
    languages: [javascript]

  # =========================
  # ⏱ Suspicious Behavior
  # =========================

  - id: suspicious-interval
    pattern: setInterval(...)
    message: "Repeated execution detected"
    severity: INFO
    languages: [javascript]

  # =========================
  # 🔗 Advanced Pattern Chains
  # =========================

  - id: eval-network-response
    pattern: |
      $X = fetch(...);
      eval($X)
    message: "Evaluating network response"
    severity: ERROR
    languages: [javascript]

  - id: remote-code-chain
    patterns:
      - pattern: fetch($URL)
      - pattern: eval(...)
    message: "Remote code execution chain detected"
    severity: ERROR
    languages: [javascript]

  - id: execute-script-risk
    pattern: chrome.scripting.executeScript(...)
    message: "Script injection capability - high risk with all_urls"
    severity: ERROR
    languages: [javascript]
    - id: chrome-all-urls
      pattern: '"<all_urls>"'
      message: "Extension has access to all URLs"
      severity: WARNING
      languages: [json]
    - id: chrome-webrequest-blocking
      pattern: '"webRequestBlocking"'
      message: "Can intercept and modify requests"
      severity: ERROR
      languages: [json]
    - id: chrome-file-access
      pattern: '"file:///*"'
      message: "Access to local files"
      severity: ERROR
      languages: [json]
