<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="utf-8">
  <title>ExtensionShield</title>
  <meta name="color-scheme" content="light">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body class="light">
  <div class="bg-logo" aria-hidden="true">
    <img src="icons/logo.svg" alt="" width="320" height="320">
  </div>
  <div class="app">
  <div class="app-inner" data-tab="extensions">
  <header class="header">
    <div class="brand">
      <img src="icons/logo.svg" alt="" class="brand-icon">
      <span class="brand-name">ExtensionShield</span>
    </div>
    <div class="header-actions">
      <button type="button" class="theme-toggle" id="themeToggle" aria-label="Toggle light/dark mode" title="Toggle theme">
        <span class="theme-icon-light" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
        </span>
        <span class="theme-icon-dark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </span>
      </button>
    </div>
  </header>

  <!-- Below header: only in Extensions pane -->
  <div id="belowHeader" class="below-header">
    <span class="below-header-text"><span id="extCountText">—</span> extensions installed</span>
    <a href="https://extensionshield.com/scan" target="_blank" rel="noopener noreferrer" class="below-header-link">View on site</a>
  </div>

  <div class="tabs-wrap">
    <button type="button" class="tab-btn active" id="tabExtensions" data-tab="extensions">Extensions</button>
    <button type="button" class="tab-btn" id="tabScanUrl" data-tab="scanurl">Scan URL</button>
  </div>

  <div class="panes">
    <div id="paneExtensions" class="pane active">
  <div id="status" class="status" hidden>
    <div class="spinner"></div>
    <span id="statusText">Scanning…</span>
  </div>

  <div id="errorBar" class="error-bar" hidden></div>

  <div id="content" class="content">
    <table class="tbl">
      <thead>
        <tr>
          <th class="th-ext">Extension</th>
          <th class="th-risk">Risk</th>
          <th class="th-evidence th-report">
            <span class="th-report-label">Report</span>
            <span class="th-report-arrow">↗</span>
          </th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
  </div>

  <footer class="footer"></footer>
    </div>

    <div id="paneScanUrl" class="pane">
      <div class="scan-url-pane">
        <div class="scan-search-container" id="scanSearchContainer">
          <span class="scan-search-chrome-icon" aria-hidden="true">
            <img src="icons/chrome.svg" alt="" width="20" height="20" class="scan-search-chrome-logo">
          </span>
          <input type="text" id="scanUrlInput" class="scan-search-input" placeholder="Search extension name or paste Store URL" autocomplete="off">
          <button type="button" id="scanUrlSubmit" class="scan-search-btn" aria-label="Scan extension">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="8"></circle><path d="M21 21l-4.35-4.35"></path></svg>
          </button>
        </div>
        <div id="scanUrlMessage" class="scan-url-message" role="status" aria-live="polite"></div>
        <div id="scanResultsContent" class="scan-results-content" hidden>
          <table class="tbl">
            <thead>
              <tr>
                <th class="th-ext">Extension</th>
                <th class="th-risk">Risk</th>
                <th class="th-evidence th-report">
                  <span class="th-report-label">Report</span>
                  <span class="th-report-arrow">↗</span>
                </th>
              </tr>
            </thead>
            <tbody id="scanResultRows"></tbody>
          </table>
        </div>
        <a href="https://extensionshield.com/scan" target="_blank" rel="noopener noreferrer" class="scan-url-detail-link">
          Detailed results available on site. Click here
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </a>
      </div>
    </div>
  </div>
  </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
